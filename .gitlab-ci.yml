stages:
  - lint
  - test
  - security
  - package

variables:
  CARGO_TERM_COLOR: "always"
  RUSTFLAGS: "-D warnings"
  RUST_BACKTRACE: "1"
  SCCACHE_VERSION: "0.8.2"

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "schedule"

# The k8s runner injects RUSTC_WRAPPER=sccache (with Redis backend env vars),
# but the rust:1 image doesn't ship the binary. Drop in the released musl
# build so cargo can find it; sccache then talks to Redis on its own.
# This is also why there's no GitLab cache config — sccache handles it.
.install-sccache:
  before_script:
    - |
      if ! command -v sccache >/dev/null; then
        curl -fsSL "https://github.com/mozilla/sccache/releases/download/v${SCCACHE_VERSION}/sccache-v${SCCACHE_VERSION}-x86_64-unknown-linux-musl.tar.gz" -o /tmp/sccache.tar.gz
        tar -xzf /tmp/sccache.tar.gz -C /tmp
        install -m 0755 "/tmp/sccache-v${SCCACHE_VERSION}-x86_64-unknown-linux-musl/sccache" /usr/local/bin/sccache
      fi

lint:
  stage: lint
  image: rust:1
  before_script:
    - !reference [.install-sccache, before_script]
    - rustup component add rustfmt clippy
  script:
    - cargo fmt --all --check
    - cargo clippy --all-targets --all-features -- -D warnings

test:linux:
  stage: test
  image: rust:1
  before_script:
    - !reference [.install-sccache, before_script]
  script:
    - cargo build --all-targets
    - cargo test --all-targets -- --test-threads=1

# Requires GitLab.com SaaS macOS runners (or self-hosted equivalent).
# Remove or adjust `tags:` if your instance uses different runner tags.
test:macos:
  stage: test
  tags:
    - saas-macos-medium-m1
  image: macos-14-xcode-15
  before_script:
    - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --profile minimal
    - source "$HOME/.cargo/env"
  script:
    - cargo build --all-targets
    - cargo test --all-targets -- --test-threads=1
  allow_failure: true

advisory:
  stage: security
  image: rust:1
  # Nightly schedule keeps new RUSTSEC IDs hitting a green baseline.
  before_script:
    - !reference [.install-sccache, before_script]
  script:
    - cargo install --locked cargo-audit
    - cargo audit

deny:
  stage: security
  image: rust:1
  before_script:
    - !reference [.install-sccache, before_script]
  script:
    - cargo install --locked cargo-deny
    - cargo deny check bans licenses sources advisories

semgrep:
  stage: security
  image: returntocorp/semgrep
  variables:
    SEMGREP_RULES: >-
      p/rust
      p/security-audit
      p/secrets
      p/supply-chain
  script:
    - semgrep ci --config=auto

sbom:
  stage: package
  image: rust:1
  before_script:
    - !reference [.install-sccache, before_script]
  script:
    - cargo install --locked cargo-cyclonedx
    - cargo cyclonedx --format json --override-filename ferromail-sbom
  artifacts:
    name: sbom
    paths:
      - ferromail-sbom.cdx.json

msrv:
  stage: test
  image: rust:1.92.0
  before_script:
    - !reference [.install-sccache, before_script]
  script:
    - cargo check --all-targets
